<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listen Now</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      max-width: 400px;
      width: 100%;
      padding: 0 24px;
      text-align: center;
    }

    .cover {
      width: 220px;
      height: 220px;
      border-radius: 12px;
      object-fit: cover;
      margin: 0 auto 28px;
      display: block;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .cover-placeholder {
      width: 220px;
      height: 220px;
      border-radius: 12px;
      background: #222;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cover-placeholder svg {
      opacity: 0.3;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .artist {
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 32px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 15px 20px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.1s ease, opacity 0.1s ease;
    }

    .btn:active { transform: scale(0.97); opacity: 0.9; }

    .btn-spotify {
      background: #1DB954;
      color: #000;
    }

    .btn-apple {
      background: #fc3c44;
      color: #fff;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
      font-weight: 500;
    }

    .footer {
      margin-top: 32px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
    }

    .loading {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="loading">Loading...</div>
  </div>

  <script>
    // ── Config is injected server-side or loaded from URL slug ──────────────
    // In production: Next.js/Express reads slug from URL, fetches from Supabase,
    // and renders this page with the correct song data.
    //
    // For static preview / testing: pass ?slug=test&title=...&artist=...
    // For Replit/Node server: see smart-link/server.js

    const SUPABASE_URL = '__SUPABASE_URL__';  // Replaced by server at render time
    const SUPABASE_KEY = '__SUPABASE_ANON_KEY__';  // Public anon key only

    // ── Parse song data ──────────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const slug = window.location.pathname.split('/').filter(Boolean).pop()
              || params.get('slug')
              || 'demo';

    // Song data can be embedded by the server, or fetched from Supabase
    const songData = window.__SONG_DATA__ || null;

    async function fetchSongData(slug) {
      if (songData) return songData;

      // Fallback: fetch from Supabase directly (for static hosting)
      if (SUPABASE_URL.startsWith('http')) {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/smart_links?slug=eq.${slug}&select=*`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const rows = await res.json();
        if (rows && rows[0]) return rows[0];
      }

      // Demo fallback
      return {
        slug,
        title: params.get('title') || 'My Song',
        artist: params.get('artist') || 'Artist Name',
        cover_url: params.get('cover') || null,
        spotify_url: params.get('spotify') || null,
        apple_url: params.get('apple') || null
      };
    }

    // ── Track click to Supabase ──────────────────────────────────────────────
    async function trackClick(slug, destination) {
      if (!SUPABASE_URL.startsWith('http')) return;

      try {
        await fetch(`${SUPABASE_URL}/rest/v1/utm_clicks`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({
            slug,
            destination,
            source: document.referrer || 'direct',
            user_agent: navigator.userAgent,
            created_at: new Date().toISOString()
          })
        });
      } catch (e) {
        // Silent fail — never block the redirect
      }
    }

    // ── Handle click: track then redirect ───────────────────────────────────
    window.handleClick = async function(destination, url) {
      const slug = window.__CURRENT_SLUG__;
      await trackClick(slug, destination);
      window.location.href = url;
    };

    // ── Render page ──────────────────────────────────────────────────────────
    async function render() {
      const song = await fetchSongData(slug);
      window.__CURRENT_SLUG__ = song.slug || slug;

      // Update page title
      document.title = `${song.title} — ${song.artist}`;

      // Build HTML
      const coverHtml = song.cover_url
        ? `<img class="cover" src="${song.cover_url}" alt="${song.title} cover art" />`
        : `<div class="cover-placeholder">
             <svg width="64" height="64" viewBox="0 0 24 24" fill="white">
               <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
             </svg>
           </div>`;

      const spotifyBtn = song.spotify_url
        ? `<a class="btn btn-spotify" onclick="handleClick('spotify', '${song.spotify_url}'); return false;" href="${song.spotify_url}">
             <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
               <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
             </svg>
             Listen on Spotify
           </a>`
        : '';

      const appleBtn = song.apple_url
        ? `<a class="btn btn-apple" onclick="handleClick('apple', '${song.apple_url}'); return false;" href="${song.apple_url}">
             <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
               <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
             </svg>
             Listen on Apple Music
           </a>`
        : '';

      document.getElementById('card').innerHTML = `
        ${coverHtml}
        <h1>${song.title}</h1>
        <p class="artist">${song.artist}</p>
        <div class="buttons">
          ${spotifyBtn}
          ${appleBtn}
        </div>
        <p class="footer">runsound.fm</p>
      `;
    }

    render().catch(err => {
      document.getElementById('card').innerHTML = `<p class="loading">Something went wrong.</p>`;
      console.error(err);
    });
  </script>
</body>
</html>
