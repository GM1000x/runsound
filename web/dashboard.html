<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RunSound — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #FAFAF7;
      --surface:  #ffffff;
      --border:   #E8E8E3;
      --border2:  #D4D4CE;
      --text:     #1a1a18;
      --muted:    #6b6b65;
      --accent:   #7c3aed;
      --accent-l: #ede9fe;
      --green:    #16a34a;
      --green-l:  #dcfce7;
      --red:      #dc2626;
      --red-l:    #fee2e2;
      --radius:   10px;
      --mono:     'Menlo', 'Monaco', 'Consolas', monospace;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    /* ── NAV ── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; height: 60px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.02em; }
    .logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-artist { font-size: 0.85rem; color: var(--muted); }
    .nav-badge {
      display: flex; align-items: center; gap: 6px;
      background: var(--green-l); border: 1px solid #bbf7d0;
      border-radius: 999px; padding: 3px 10px;
      font-size: 0.75rem; font-weight: 600; color: var(--green);
    }
    .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

    /* ── PAGE ── */
    .page { max-width: 860px; margin: 0 auto; padding: 2.5rem 5% 5rem; }

    /* ── WELCOME ── */
    .welcome {
      background: var(--accent-l); border: 1px solid rgba(124,58,237,0.2);
      border-radius: 12px; padding: 1rem 1.25rem;
      margin-bottom: 1.75rem; display: none;
    }
    .welcome.show { display: block; }
    .welcome strong { font-weight: 600; color: var(--accent); }
    .welcome p { font-size: 0.88rem; color: var(--muted); margin-top: 2px; }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .section-title { font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; }
    .section-sub { font-size: 0.8rem; color: var(--muted); }

    /* ── TOP GRID ── */
    .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
    @media (max-width: 580px) { .top-grid { grid-template-columns: 1fr; } }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
    }
    .card-label {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem;
    }

    /* ── API KEY ── */
    .key-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 9px 12px;
      margin-bottom: 10px;
    }
    .key-value {
      font-family: var(--mono); font-size: 0.78rem;
      color: var(--muted); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .icon-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 8px;
      font-size: 0.72rem; color: var(--muted);
      cursor: pointer; transition: border-color .15s, color .15s;
      white-space: nowrap;
    }
    .icon-btn:hover { border-color: var(--border2); color: var(--text); }
    .key-hint { font-size: 0.75rem; color: var(--muted); line-height: 1.5; }
    .key-hint code {
      font-family: var(--mono); font-size: 0.72rem;
      background: var(--bg); border: 1px solid var(--border);
      padding: 1px 5px; border-radius: 4px; color: var(--accent);
    }

    /* ── CREDITS ── */
    .credits-amount {
      font-size: 2.2rem; font-weight: 700; letter-spacing: -0.04em;
      line-height: 1; margin-bottom: 4px;
    }
    .credits-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; }
    .credits-sub.low { color: var(--red); }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--text); color: var(--bg);
      border: none; border-radius: var(--radius);
      padding: 8px 16px; font-size: 0.85rem; font-weight: 600;
      font-family: inherit; cursor: pointer; text-decoration: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-outline {
      background: none; color: var(--text);
      border: 1px solid var(--border2);
    }
    .btn-outline:hover { border-color: var(--text); opacity: 1; }

    /* ── SKILLS ── */
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }

    .skill-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 1.1rem;
      cursor: pointer; transition: border-color .15s;
      text-align: left; width: 100%;
    }
    .skill-card:hover { border-color: var(--border2); }
    .skill-card.expanded { border-color: rgba(124,58,237,0.35); background: var(--surface); }

    .skill-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
    .skill-icon {
      width: 30px; height: 30px; background: var(--accent-l);
      border-radius: 7px; display: flex; align-items: center;
      justify-content: center; font-size: 15px; flex-shrink: 0;
    }
    .skill-meta { flex: 1; }
    .skill-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 3px; }
    .skill-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.4; }
    .skill-price {
      font-size: 0.72rem; font-weight: 600; color: var(--green);
      background: var(--green-l); padding: 2px 8px;
      border-radius: 999px; white-space: nowrap; flex-shrink: 0;
    }

    .skill-curl { display: none; margin-top: 0.85rem; }
    .skill-card.expanded .skill-curl { display: block; }

    .curl-block {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      font-family: var(--mono); font-size: 0.7rem;
      color: var(--muted); line-height: 1.65;
      overflow-x: auto; white-space: pre;
      position: relative;
    }
    .curl-copy {
      position: absolute; top: 7px; right: 7px;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 5px; padding: 2px 8px;
      font-size: 0.65rem; font-weight: 600; color: var(--muted);
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: color .15s, border-color .15s;
    }
    .curl-copy:hover { color: var(--text); border-color: var(--text); }

    /* ── RUN HISTORY ── */
    .run-table {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .run-row {
      display: grid;
      grid-template-columns: 24px 1fr auto auto auto;
      gap: 0.75rem; align-items: center;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .run-row:last-child { border-bottom: none; }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.succeeded { background: var(--green); }
    .status-dot.running   { background: #f59e0b; animation: blink 1.4s infinite; }
    .status-dot.failed    { background: var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

    .run-skill { font-size: 0.85rem; font-weight: 600; }
    .run-time  { font-size: 0.75rem; color: var(--muted); }
    .run-units { font-size: 0.78rem; color: var(--muted); text-align: right; }
    .run-cost  { font-size: 0.82rem; font-weight: 600; text-align: right; min-width: 52px; }
    .run-status-badge {
      font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 999px;
      text-align: center;
    }
    .run-status-badge.succeeded { background: var(--green-l); color: var(--green); }
    .run-status-badge.failed    { background: var(--red-l);   color: var(--red);   }
    .run-status-badge.running   { background: #fef3c7; color: #92400e; }

    /* ── EMPTY / SKELETON ── */
    .empty-state {
      text-align: center; padding: 2.5rem 1rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; color: var(--muted); font-size: 0.85rem;
    }
    .empty-state strong { display: block; font-size: 0.95rem; color: var(--text); margin-bottom: 4px; }

    .skeleton-block {
      background: linear-gradient(90deg, var(--border) 25%, #F0F0EB 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 5px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--text); color: var(--bg);
      padding: 9px 18px; border-radius: 999px;
      font-size: 0.82rem; font-weight: 600;
      opacity: 0; transition: opacity .2s, transform .2s;
      pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">Run<span>Sound</span></a>
  <div class="nav-right">
    <span class="nav-artist" id="nav-artist"></span>
    <div class="nav-badge"><div class="nav-dot"></div>Live</div>
  </div>
</nav>

<div class="page">

  <div class="welcome" id="welcome">
    <strong>You're in.</strong>
    <p>Copy your API key below and paste it into your AI agent or terminal to start running skills.</p>
  </div>

  <!-- API key + Credits -->
  <div class="top-grid">
    <div class="card">
      <div class="card-label">API Key</div>
      <div class="key-row">
        <span class="key-value" id="key-display">Loading…</span>
        <button class="icon-btn" onclick="toggleKey()" id="key-eye">Show</button>
        <button class="icon-btn" onclick="copyKey()">Copy</button>
      </div>
      <p class="key-hint">
        Use as <code>Authorization: Bearer &lt;key&gt;</code>
      </p>
    </div>

    <div class="card">
      <div class="card-label">Credits</div>
      <div class="credits-amount" id="credits-amount">—</div>
      <div class="credits-sub" id="credits-sub">Loading balance…</div>
      <button class="btn" onclick="topup()">+ Add credits</button>
    </div>
  </div>

  <!-- Skills -->
  <div class="section-header">
    <span class="section-title">Skills</span>
    <span class="section-sub">Click to see the curl command</span>
  </div>
  <div class="skills-grid" id="skills-grid">
    <div class="card"><div class="skeleton-block" style="height:14px;width:55%;margin-bottom:8px"></div><div class="skeleton-block" style="height:12px;width:85%"></div></div>
    <div class="card"><div class="skeleton-block" style="height:14px;width:60%;margin-bottom:8px"></div><div class="skeleton-block" style="height:12px;width:75%"></div></div>
    <div class="card"><div class="skeleton-block" style="height:14px;width:50%;margin-bottom:8px"></div><div class="skeleton-block" style="height:12px;width:90%"></div></div>
    <div class="card"><div class="skeleton-block" style="height:14px;width:65%;margin-bottom:8px"></div><div class="skeleton-block" style="height:12px;width:70%"></div></div>
  </div>

  <!-- Run history -->
  <div class="section-header" style="margin-top:2rem">
    <span class="section-title">Run history</span>
    <span class="section-sub" id="history-sub"></span>
  </div>
  <div id="run-container">
    <div class="run-table" style="padding:1rem">
      <div class="skeleton-block" style="height:14px;width:40%;margin-bottom:10px"></div>
      <div class="skeleton-block" style="height:14px;width:60%"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const API  = '';
  let apiKey = localStorage.getItem('runsound_api_key') || '';
  let keyVisible = false;

  if (!apiKey) window.location.href = '/signup.html';

  if (new URLSearchParams(location.search).get('welcome') === '1') {
    document.getElementById('welcome').classList.add('show');
    history.replaceState({}, '', '/dashboard.html');
  }

  // ── API key ───────────────────────────────────────────────────────────────
  function masked(k) { return k.slice(0, 10) + '••••••••••••••••••••••'; }
  function renderKey() {
    document.getElementById('key-display').textContent = keyVisible ? apiKey : masked(apiKey);
    document.getElementById('key-eye').textContent = keyVisible ? 'Hide' : 'Show';
  }
  renderKey();

  function toggleKey() { keyVisible = !keyVisible; renderKey(); }
  function copyKey() {
    navigator.clipboard.writeText(apiKey).then(() => toast('API key copied'));
  }

  // ── Credits ───────────────────────────────────────────────────────────────
  async function loadCredits() {
    try {
      const r = await fetch('/api/credits/balance', { headers: { Authorization: `Bearer ${apiKey}` } });
      const d = await r.json();
      if (!d.ok) throw new Error(d.error);
      document.getElementById('credits-amount').textContent = `$${Number(d.credits).toFixed(2)}`;
      const sub = document.getElementById('credits-sub');
      sub.textContent = d.low_balance_warning
        ? 'Low balance — add credits to keep running skills'
        : 'Available to spend';
      if (d.low_balance_warning) sub.classList.add('low');
      if (d.artist_name) document.getElementById('nav-artist').textContent = d.artist_name;
    } catch {
      document.getElementById('credits-amount').textContent = '—';
      document.getElementById('credits-sub').textContent = 'Could not load balance';
    }
  }

  async function topup() {
    const amount = prompt('How many credits ($USD)?', '10');
    if (!amount || isNaN(parseFloat(amount))) return;
    try {
      const r = await fetch('/api/credits/topup', {
        method: 'POST',
        headers: { Authorization: `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount_usd: parseFloat(amount) })
      });
      const d = await r.json();
      if (d.checkout_url) window.location.href = d.checkout_url;
      else toast(d.error || 'Something went wrong');
    } catch { toast('Network error'); }
  }

  // ── Skills ────────────────────────────────────────────────────────────────
  const skillIcons = {
    'creator-scout':  '🎯',
    'dm-outreach':    '💬',
    'hook-generator': '🪝',
    'gig-pitcher':    '🎸',
    'release-kit':    '📦',
    'trend-matcher':  '📈',
    'playlist-pitcher':'🎵',
    'press-pitcher':  '📰',
    'full-campaign':  '🚀',
  };

  const curlExamples = {
    'creator-scout': `curl -X POST https://run-sound.com/api/skills/run \\
  -H "Authorization: Bearer ${apiKey}" \\
  -H "Content-Type: application/json" \\
  -d '{
    "skill": "creator-scout",
    "spotify_url": "https://open.spotify.com/artist/...",
    "budget_usd": 150
  }'`,
    'gig-pitcher': `curl -X POST https://run-sound.com/api/skills/run \\
  -H "Authorization: Bearer ${apiKey}" \\
  -H "Content-Type: application/json" \\
  -d '{
    "skill": "gig-pitcher",
    "city": "Stockholm",
    "genre": "indie",
    "artist_name": "Your Name",
    "artist_bio": "Short bio here",
    "spotify_url": "https://open.spotify.com/artist/..."
  }'`,
    'hook-generator': `curl -X POST https://run-sound.com/api/skills/run \\
  -H "Authorization: Bearer ${apiKey}" \\
  -H "Content-Type: application/json" \\
  -d '{
    "skill": "hook-generator",
    "spotify_url": "https://open.spotify.com/track/...",
    "count": 5
  }'`,
    'release-kit': `curl -X POST https://run-sound.com/api/skills/run \\
  -H "Authorization: Bearer ${apiKey}" \\
  -H "Content-Type: application/json" \\
  -d '{
    "skill": "release-kit",
    "spotify_url": "https://open.spotify.com/track/...",
    "artist_name": "Your Name",
    "release_date": "2025-09-01",
    "artist_bio": "Short bio here"
  }'`,
  };

  function getCurl(slug) {
    return curlExamples[slug] || `curl -X POST https://run-sound.com/api/skills/run \\
  -H "Authorization: Bearer ${apiKey}" \\
  -H "Content-Type: application/json" \\
  -d '{"skill":"${slug}"}'`;
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function loadSkills() {
    try {
      const r = await fetch('/api/skills');
      const d = await r.json();
      if (!d.ok || !d.skills.length) throw new Error();

      const grid = document.getElementById('skills-grid');
      grid.innerHTML = '';
      d.skills.forEach(skill => {
        const btn = document.createElement('button');
        btn.className = 'skill-card';
        btn.innerHTML = `
          <div class="skill-top">
            <div class="skill-icon">${skillIcons[skill.slug] || '⚡'}</div>
            <span class="skill-price">$${skill.price_per_unit}/${skill.unit_label}</span>
          </div>
          <div class="skill-meta">
            <div class="skill-name">${skill.name}</div>
            <div class="skill-desc">${skill.description || ''}</div>
          </div>
          <div class="skill-curl">
            <div class="curl-block"><button class="curl-copy" onclick="copyCurl(this,event)">Copy</button>${esc(getCurl(skill.slug))}</div>
          </div>`;
        btn.addEventListener('click', () => {
          const was = btn.classList.contains('expanded');
          document.querySelectorAll('.skill-card').forEach(c => c.classList.remove('expanded'));
          if (!was) btn.classList.add('expanded');
        });
        grid.appendChild(btn);
      });
    } catch {
      document.getElementById('skills-grid').innerHTML =
        '<div class="empty-state"><strong>Could not load skills</strong></div>';
    }
  }

  function copyCurl(btn, e) {
    e.stopPropagation();
    const text = btn.parentElement.textContent.replace('Copy','').trim();
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  }

  // ── Run history ───────────────────────────────────────────────────────────
  function timeAgo(iso) {
    const s = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (s < 60)    return `${s}s ago`;
    if (s < 3600)  return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    return `${Math.floor(s/86400)}d ago`;
  }

  async function loadRuns() {
    try {
      const r = await fetch('/api/skills/runs?limit=10', { headers: { Authorization: `Bearer ${apiKey}` } });
      const d = await r.json();
      if (!d.ok) throw new Error();

      const container = document.getElementById('run-container');

      if (!d.runs.length) {
        container.innerHTML = `<div class="empty-state">
          <strong>No runs yet</strong>
          Click a skill above to see the curl command, then run it in your terminal.
        </div>`;
        return;
      }

      document.getElementById('history-sub').textContent = `${d.runs.length} recent`;

      const table = document.createElement('div');
      table.className = 'run-table';
      d.runs.forEach(run => {
        const sc = run.status === 'succeeded' ? 'succeeded' : run.status === 'running' ? 'running' : 'failed';
        const row = document.createElement('div');
        row.className = 'run-row';
        row.innerHTML = `
          <div class="status-dot ${sc}"></div>
          <div>
            <div class="run-skill">${run.skill_slug}</div>
            <div class="run-time">${timeAgo(run.started_at)}</div>
          </div>
          <div class="run-units">${run.units_consumed != null ? `${run.units_consumed} units` : ''}</div>
          <div class="run-cost">${run.cost_usd != null ? `$${Number(run.cost_usd).toFixed(4)}` : '—'}</div>
          <div class="run-status-badge ${sc}">${run.status}</div>`;
        table.appendChild(row);
      });
      container.innerHTML = '';
      container.appendChild(table);
    } catch {
      document.getElementById('run-container').innerHTML =
        '<div class="empty-state">Could not load run history</div>';
    }
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadCredits();
  loadSkills();
  loadRuns();
</script>
</body>
</html>
