<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RunSound — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --surface2: #16161f;
      --border:   #1e1e2e;
      --border2:  #2a2a3d;
      --accent:   #7c3aed;
      --accent2:  #a855f7;
      --green:    #22c55e;
      --yellow:   #eab308;
      --red:      #ef4444;
      --text:     #f0f0f8;
      --muted:    #6b6b88;
      --muted2:   #9898b0;
      --mono:     'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
    }
    .logo { font-size: 1rem; font-weight: 800; letter-spacing: -0.03em; text-decoration: none; color: var(--text); }
    .logo span { color: var(--accent2); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .artist-name { font-size: 0.82rem; color: var(--muted2); }
    .nav-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25);
      border-radius: 100px; padding: 3px 10px;
      font-size: 0.75rem; font-weight: 600; color: var(--green);
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

    /* ── LAYOUT ── */
    .page { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }

    /* ── WELCOME BANNER ── */
    .welcome {
      background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(168,85,247,0.05));
      border: 1px solid rgba(168,85,247,0.25);
      border-radius: 16px; padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    .welcome.show { display: block; }
    .welcome h2 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .welcome p { font-size: 0.85rem; color: var(--muted2); }

    /* ── GRID ── */
    .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    @media (max-width: 600px) { .top-grid { grid-template-columns: 1fr; } }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
    }
    .card-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem;
    }

    /* ── API KEY ── */
    .key-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg); border: 1px solid var(--border2);
      border-radius: 8px; padding: 10px 12px;
      margin-bottom: 10px;
    }
    .key-value {
      font-family: var(--mono); font-size: 0.78rem;
      color: var(--muted2); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .icon-btn {
      background: none; border: none; cursor: pointer; padding: 2px 4px;
      color: var(--muted); font-size: 0.8rem;
      transition: color .15s;
    }
    .icon-btn:hover { color: var(--text); }

    .key-hint { font-size: 0.75rem; color: var(--muted); line-height: 1.5; }
    .key-hint code {
      font-family: var(--mono); font-size: 0.72rem;
      background: var(--bg); padding: 1px 5px; border-radius: 4px;
      color: var(--accent2);
    }

    /* ── CREDITS ── */
    .credits-amount {
      font-size: 2rem; font-weight: 800; letter-spacing: -0.04em;
      margin-bottom: 4px;
    }
    .credits-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; }
    .topup-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; padding: 8px 14px;
      font-size: 0.82rem; font-weight: 600; font-family: inherit;
      cursor: pointer; text-decoration: none; transition: opacity .15s;
    }
    .topup-btn:hover { opacity: 0.85; }

    /* ── SECTION HEADERS ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.75rem; margin-top: 2rem;
    }
    .section-title { font-size: 0.95rem; font-weight: 700; letter-spacing: -0.01em; }
    .section-sub { font-size: 0.78rem; color: var(--muted); }

    /* ── SKILLS GRID ── */
    .skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    @media (max-width: 600px) { .skills-grid { grid-template-columns: 1fr; } }

    .skill-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem;
      cursor: pointer; transition: border-color .15s;
      text-align: left;
    }
    .skill-card:hover { border-color: var(--border2); }
    .skill-card.expanded { border-color: rgba(168,85,247,0.4); }

    .skill-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .skill-name { font-size: 0.88rem; font-weight: 700; margin-bottom: 4px; }
    .skill-desc { font-size: 0.78rem; color: var(--muted2); line-height: 1.4; }
    .skill-price {
      font-size: 0.72rem; font-weight: 700; color: var(--accent2);
      background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.2);
      border-radius: 6px; padding: 2px 7px; white-space: nowrap; flex-shrink: 0;
    }

    .skill-curl {
      display: none; margin-top: 0.85rem;
    }
    .skill-card.expanded .skill-curl { display: block; }
    .curl-block {
      background: var(--bg); border: 1px solid var(--border2);
      border-radius: 8px; padding: 10px 12px;
      font-family: var(--mono); font-size: 0.7rem;
      color: #a0a0c0; line-height: 1.6;
      overflow-x: auto; white-space: pre;
      position: relative;
    }
    .curl-copy {
      position: absolute; top: 6px; right: 6px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 5px; padding: 2px 8px;
      font-size: 0.65rem; font-weight: 600; color: var(--muted2);
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: color .15s;
    }
    .curl-copy:hover { color: var(--text); }

    /* ── RUN HISTORY ── */
    .run-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .run-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 0.85rem 1rem;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 0.75rem; align-items: center;
    }

    .run-status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .run-status-dot.succeeded { background: var(--green); }
    .run-status-dot.running   { background: var(--yellow); animation: pulse-dot 1.5s infinite; }
    .run-status-dot.failed    { background: var(--red); }

    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .run-skill { font-size: 0.85rem; font-weight: 600; }
    .run-time  { font-size: 0.75rem; color: var(--muted); }
    .run-units { font-size: 0.78rem; color: var(--muted2); text-align: right; }
    .run-cost  { font-size: 0.78rem; font-weight: 600; color: var(--text); text-align: right; min-width: 48px; }

    .empty-state {
      text-align: center; padding: 2.5rem 1rem;
      color: var(--muted); font-size: 0.85rem;
    }
    .empty-state strong { display: block; color: var(--muted2); margin-bottom: 4px; font-size: 0.95rem; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--text); color: var(--bg);
      padding: 10px 20px; border-radius: 100px;
      font-size: 0.82rem; font-weight: 600;
      opacity: 0; transition: opacity .2s, transform .2s;
      pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── LOADING ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px; height: 16px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse 60% 30% at 50% 0%, rgba(124,58,237,0.08), transparent 70%);
    }
    .page { position: relative; z-index: 1; }
  </style>
</head>
<body>
<div class="glow"></div>

<nav>
  <a href="/" class="logo">Run<span>Sound</span></a>
  <div class="nav-right">
    <span class="artist-name" id="nav-artist-name"></span>
    <div class="nav-badge"><div class="dot"></div>API</div>
  </div>
</nav>

<div class="page">

  <!-- Welcome banner (only on first login) -->
  <div class="welcome" id="welcome-banner">
    <h2>You're in. Here's your API key.</h2>
    <p>Copy it below and paste it into your AI agent or terminal to start running skills.</p>
  </div>

  <!-- API key + Credits -->
  <div class="top-grid">

    <div class="card">
      <div class="card-label">API Key</div>
      <div class="key-row">
        <span class="key-value" id="api-key-display">Loading...</span>
        <button class="icon-btn" onclick="toggleKey()" id="key-toggle-btn" title="Show/hide">👁</button>
        <button class="icon-btn" onclick="copyKey()" title="Copy">📋</button>
      </div>
      <p class="key-hint">
        Use as <code>Authorization: Bearer &lt;key&gt;</code> in every request.
      </p>
    </div>

    <div class="card">
      <div class="card-label">Credits</div>
      <div class="credits-amount" id="credits-amount">—</div>
      <div class="credits-sub" id="credits-sub">Loading balance...</div>
      <button class="topup-btn" onclick="topup()">+ Add credits</button>
    </div>

  </div>

  <!-- Skills catalog -->
  <div class="section-header">
    <span class="section-title">Skills</span>
    <span class="section-sub">Click a skill to see the curl command</span>
  </div>
  <div class="skills-grid" id="skills-grid">
    <div class="card"><div class="skeleton" style="width:60%;margin-bottom:8px"></div><div class="skeleton" style="width:90%"></div></div>
    <div class="card"><div class="skeleton" style="width:60%;margin-bottom:8px"></div><div class="skeleton" style="width:90%"></div></div>
    <div class="card"><div class="skeleton" style="width:60%;margin-bottom:8px"></div><div class="skeleton" style="width:90%"></div></div>
    <div class="card"><div class="skeleton" style="width:60%;margin-bottom:8px"></div><div class="skeleton" style="width:90%"></div></div>
  </div>

  <!-- Run history -->
  <div class="section-header" style="margin-top: 2rem;">
    <span class="section-title">Run history</span>
    <span class="section-sub" id="history-sub"></span>
  </div>
  <div class="run-list" id="run-list">
    <div class="card"><div class="skeleton" style="width:40%"></div></div>
    <div class="card"><div class="skeleton" style="width:55%"></div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const API_BASE = '';
  let apiKey     = localStorage.getItem('runsound_api_key') || '';
  let keyVisible = false;

  // ── Redirect if no key ────────────────────────────────────────────────────
  if (!apiKey) {
    window.location.href = '/signup.html';
  }

  // ── Welcome banner ────────────────────────────────────────────────────────
  if (new URLSearchParams(location.search).get('welcome') === '1') {
    document.getElementById('welcome-banner').classList.add('show');
    history.replaceState({}, '', '/dashboard.html');
  }

  // ── API key display ───────────────────────────────────────────────────────
  function maskedKey(k) {
    return k.slice(0, 10) + '••••••••••••••••••••••••••••';
  }

  function renderKey() {
    document.getElementById('api-key-display').textContent = keyVisible ? apiKey : maskedKey(apiKey);
  }
  renderKey();

  function toggleKey() {
    keyVisible = !keyVisible;
    renderKey();
    document.getElementById('key-toggle-btn').textContent = keyVisible ? '🙈' : '👁';
  }

  function copyKey() {
    navigator.clipboard.writeText(apiKey).then(() => showToast('API key copied'));
  }

  // ── Credits ───────────────────────────────────────────────────────────────
  async function loadCredits() {
    try {
      const r = await fetch('/api/credits/balance', {
        headers: { Authorization: `Bearer ${apiKey}` }
      });
      const d = await r.json();
      if (!d.ok) throw new Error(d.error);

      document.getElementById('credits-amount').textContent = `$${d.credits.toFixed(2)}`;
      document.getElementById('credits-sub').textContent =
        d.low_balance_warning ? 'Low balance — add credits to keep running skills' : 'Available to spend on skills';

      if (d.artist_name) {
        document.getElementById('nav-artist-name').textContent = d.artist_name;
      }
    } catch (e) {
      document.getElementById('credits-amount').textContent = '—';
      document.getElementById('credits-sub').textContent = 'Could not load balance';
    }
  }

  async function topup() {
    const amount = prompt('Add credits ($USD):', '10');
    if (!amount || isNaN(parseFloat(amount))) return;
    try {
      const r = await fetch('/api/credits/topup', {
        method: 'POST',
        headers: { Authorization: `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount_usd: parseFloat(amount) })
      });
      const d = await r.json();
      if (d.checkout_url) window.location.href = d.checkout_url;
      else showToast(d.error || 'Something went wrong');
    } catch { showToast('Network error'); }
  }

  // ── Skills ────────────────────────────────────────────────────────────────
  // curl examples per skill
  const curlExamples = {
    'creator-scout': `curl -X POST https://run-sound.com/api/skills/run \\
  -H "Authorization: Bearer ${apiKey || 'YOUR_KEY'}" \\
  -H "Content-Type: application/json" \\
  -d '{
    "skill": "creator-scout",
    "spotify_url": "https://open.spotify.com/artist/...",
    "budget_usd": 150
  }'`,
    'gig-pitcher': `curl -X POST https://run-sound.com/api/skills/run \\
  -H "Authorization: Bearer ${apiKey || 'YOUR_KEY'}" \\
  -H "Content-Type: application/json" \\
  -d '{
    "skill": "gig-pitcher",
    "city": "Stockholm",
    "genre": "indie",
    "artist_name": "Your Name",
    "artist_bio": "Short bio...",
    "spotify_url": "https://open.spotify.com/artist/..."
  }'`,
    'hook-generator': `curl -X POST https://run-sound.com/api/skills/run \\
  -H "Authorization: Bearer ${apiKey || 'YOUR_KEY'}" \\
  -H "Content-Type: application/json" \\
  -d '{
    "skill": "hook-generator",
    "spotify_url": "https://open.spotify.com/track/...",
    "count": 5
  }'`,
    'release-kit': `curl -X POST https://run-sound.com/api/skills/run \\
  -H "Authorization: Bearer ${apiKey || 'YOUR_KEY'}" \\
  -H "Content-Type: application/json" \\
  -d '{
    "skill": "release-kit",
    "spotify_url": "https://open.spotify.com/track/...",
    "artist_name": "Your Name",
    "release_date": "2025-09-01",
    "artist_bio": "Short bio..."
  }'`,
  };

  function getCurl(slug) {
    return curlExamples[slug] || `curl -X POST https://run-sound.com/api/skills/run \\
  -H "Authorization: Bearer ${apiKey || 'YOUR_KEY'}" \\
  -H "Content-Type: application/json" \\
  -d '{ "skill": "${slug}" }'`;
  }

  async function loadSkills() {
    try {
      const r = await fetch('/api/skills');
      const d = await r.json();
      if (!d.ok || !d.skills.length) return;

      const grid = document.getElementById('skills-grid');
      grid.innerHTML = '';

      d.skills.forEach(skill => {
        const card = document.createElement('div');
        card.className = 'skill-card';
        card.innerHTML = `
          <div class="skill-top">
            <div>
              <div class="skill-name">${skill.name}</div>
              <div class="skill-desc">${skill.description || ''}</div>
            </div>
            <span class="skill-price">$${skill.price_per_unit}/${skill.unit_label}</span>
          </div>
          <div class="skill-curl">
            <div class="curl-block"><button class="curl-copy" onclick="copyCurl(this, event)">Copy</button>${escHtml(getCurl(skill.slug))}</div>
          </div>
        `;
        card.addEventListener('click', () => {
          const wasExpanded = card.classList.contains('expanded');
          document.querySelectorAll('.skill-card').forEach(c => c.classList.remove('expanded'));
          if (!wasExpanded) card.classList.add('expanded');
        });
        grid.appendChild(card);
      });
    } catch (e) {
      document.getElementById('skills-grid').innerHTML =
        '<div class="empty-state">Could not load skills</div>';
    }
  }

  function copyCurl(btn, e) {
    e.stopPropagation();
    const block = btn.parentElement;
    const text  = block.textContent.replace('Copy', '').trim();
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Run history ───────────────────────────────────────────────────────────
  function timeAgo(iso) {
    const s = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (s < 60)   return `${s}s ago`;
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    return `${Math.floor(s/86400)}d ago`;
  }

  async function loadRuns() {
    try {
      const r = await fetch('/api/skills/runs?limit=10', {
        headers: { Authorization: `Bearer ${apiKey}` }
      });
      const d = await r.json();
      if (!d.ok) throw new Error();

      const list = document.getElementById('run-list');
      list.innerHTML = '';

      if (!d.runs.length) {
        list.innerHTML = `<div class="empty-state">
          <strong>No runs yet</strong>
          Copy a curl command from a skill above and run it in your terminal.
        </div>`;
        return;
      }

      document.getElementById('history-sub').textContent = `${d.runs.length} recent`;

      d.runs.forEach(run => {
        const row = document.createElement('div');
        row.className = 'run-row';
        const statusClass = run.status === 'succeeded' ? 'succeeded' : run.status === 'running' ? 'running' : 'failed';
        row.innerHTML = `
          <div class="run-status-dot ${statusClass}"></div>
          <div>
            <div class="run-skill">${run.skill_slug}</div>
            <div class="run-time">${timeAgo(run.started_at)}</div>
          </div>
          <div class="run-units">${run.units_consumed != null ? `${run.units_consumed} units` : ''}</div>
          <div class="run-cost">${run.cost_usd != null ? `$${run.cost_usd.toFixed(4)}` : '—'}</div>
        `;
        list.appendChild(row);
      });
    } catch {
      document.getElementById('run-list').innerHTML =
        '<div class="empty-state">Could not load run history</div>';
    }
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadCredits();
  loadSkills();
  loadRuns();
</script>
</body>
</html>
