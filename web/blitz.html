<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Blitz Mode — RunSound</title>
  <style>
    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --card:     #161616;
      --border:   #222222;
      --accent:   #e8ff47;
      --accent2:  #47e8c8;
      --muted:    #666666;
      --text:     #f0f0f0;
      --radius:   16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .header-logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header-logo span { color: var(--accent); }
    .header-sub {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Genre filter ── */
    .genre-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }
    .genre-bar::-webkit-scrollbar { display: none; }
    .genre-chip {
      flex-shrink: 0;
      padding: 0.35rem 0.85rem;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .genre-chip:hover { border-color: var(--accent); color: var(--accent); }
    .genre-chip.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }

    /* ── Stack / swipe area ── */
    .stack-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 1.25rem 1.25rem 6rem;
      gap: 1rem;
    }

    .clip-count {
      font-size: 0.75rem;
      color: var(--muted);
      align-self: flex-start;
    }

    /* ── Clip card ── */
    .clip-card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .clip-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }

    /* Thumbnail */
    .clip-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 9/6;
      background: #1a1a1a;
      overflow: hidden;
    }
    .clip-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .clip-thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    .clip-views-badge {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.25rem 0.6rem;
      border-radius: 99px;
      backdrop-filter: blur(8px);
    }
    .clip-open-btn {
      position: absolute;
      bottom: 0.75rem;
      right: 0.75rem;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 0.72rem;
      padding: 0.3rem 0.7rem;
      border-radius: 99px;
      text-decoration: none;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .clip-open-btn:hover { background: var(--accent); color: #000; }
    .clip-format-badge {
      position: absolute;
      top: 0.75rem;
      left: 0.75rem;
      background: var(--accent);
      color: #000;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* Body */
    .clip-body {
      padding: 1rem 1.1rem;
    }
    .clip-one-liner {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 0.45rem;
    }
    .clip-caption {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }
    .clip-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.85rem;
    }
    .clip-tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      background: #1f1f1f;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* Actions */
    .clip-actions {
      display: flex;
      gap: 0.6rem;
    }
    .btn-skip {
      flex: 1;
      padding: 0.65rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-skip:hover { border-color: #555; color: var(--text); }
    .btn-use {
      flex: 2;
      padding: 0.65rem;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #000;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-use:hover { background: #d4e83f; transform: scale(1.02); }
    .btn-use:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Empty / loading states ── */
    .state-msg {
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 3rem 2rem;
      color: var(--muted);
    }
    .state-msg .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .state-msg h3 { color: var(--text); margin-bottom: 0.4rem; }

    /* ── Generated result overlay ── */
    .result-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .result-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .result-sheet {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border-radius: var(--radius) var(--radius) 0 0;
      border: 1px solid var(--border);
      padding: 1.5rem 1.25rem;
      max-height: 85dvh;
      overflow-y: auto;
      transform: translateY(20px);
      transition: transform 0.25s;
    }
    .result-overlay.visible .result-sheet { transform: translateY(0); }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }
    .result-header h3 { font-size: 1rem; font-weight: 700; }
    .result-close {
      background: #222;
      border: none;
      color: var(--muted);
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
    }

    .result-source {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.8rem;
      background: #1a1a1a;
      border-radius: 10px;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .result-source img {
      width: 36px; height: 36px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .result-source-text { flex: 1; }
    .result-source-views { font-weight: 600; color: var(--text); }

    .result-hook {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    .result-slides {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .result-slide {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      padding: 0.6rem 0.8rem;
      background: #1a1a1a;
      border-radius: 10px;
      font-size: 0.82rem;
      line-height: 1.45;
    }
    .result-slide-num {
      flex-shrink: 0;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--border);
      color: var(--muted);
      font-size: 0.65rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    .result-why {
      font-size: 0.8rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    .result-actions {
      display: flex;
      gap: 0.6rem;
    }
    .btn-copy {
      flex: 1;
      padding: 0.7rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-copy:hover { border-color: var(--accent2); color: var(--accent2); }
    .btn-queue {
      flex: 2;
      padding: 0.7rem;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #000;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-queue:hover { background: #d4e83f; }
    .btn-queue:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #222;
      color: var(--text);
      padding: 0.65rem 1.25rem;
      border-radius: 99px;
      font-size: 0.82rem;
      opacity: 0;
      transition: all 0.2s;
      z-index: 200;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div>
    <div class="header-logo">Run<span>Sound</span> Blitz</div>
    <div class="header-sub">Swipe through formats that drive streams</div>
  </div>
</header>

<!-- Genre filter -->
<nav class="genre-bar" id="genreBar">
  <button class="genre-chip active" data-genre="">All</button>
  <button class="genre-chip" data-genre="Pop">Pop</button>
  <button class="genre-chip" data-genre="Hip-Hop">Hip-Hop</button>
  <button class="genre-chip" data-genre="R&B">R&amp;B</button>
  <button class="genre-chip" data-genre="Indie Pop">Indie Pop</button>
  <button class="genre-chip" data-genre="Electronic">Electronic</button>
  <button class="genre-chip" data-genre="Deep House">House</button>
  <button class="genre-chip" data-genre="Trap">Trap</button>
  <button class="genre-chip" data-genre="Folk">Folk</button>
  <button class="genre-chip" data-genre="Afrobeats">Afrobeats</button>
</nav>

<!-- Stack area -->
<main class="stack-area" id="stackArea">
  <div class="state-msg" id="loadingMsg">
    <div class="icon">⚡</div>
    <h3>Loading clips…</h3>
  </div>
</main>

<!-- Result overlay (bottom sheet) -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-sheet" id="resultSheet">
    <div class="result-header">
      <h3>✨ Adapted for your song</h3>
      <button class="result-close" id="resultClose">✕</button>
    </div>

    <div class="result-source" id="resultSource"></div>

    <div class="result-hook" id="resultHook"></div>

    <div class="result-slides" id="resultSlides"></div>

    <div class="result-why" id="resultWhy"></div>

    <div class="result-actions">
      <button class="btn-copy" id="btnCopy">Copy caption</button>
      <button class="btn-queue" id="btnQueue">Add to queue</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── URL params ────────────────────────────────────────────────────────────────
  const params     = new URLSearchParams(location.search);
  const TOKEN      = params.get('token');
  const CAMPAIGN   = params.get('campaign');
  const SONG       = params.get('song') || 'your song';

  // ── State ─────────────────────────────────────────────────────────────────────
  let clips        = [];
  let skipped      = new Set();
  let activeGenre  = '';
  let currentResult = null;
  let queuedPostId  = null;

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function formatViews(n) {
    if (!n) return '—';
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
    if (n >= 1_000)     return (n / 1_000).toFixed(0) + 'K';
    return String(n);
  }

  function toast(msg, duration = 2200) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration);
  }

  // ── Load clips ────────────────────────────────────────────────────────────────
  async function loadClips(genre = '') {
    const area = document.getElementById('stackArea');
    area.innerHTML = '<div class="state-msg" id="loadingMsg"><div class="icon">⚡</div><h3>Loading clips…</h3></div>';

    try {
      const qs  = genre ? `?genre=${encodeURIComponent(genre)}&limit=40` : '?limit=40';
      const res = await fetch(`/api/campaigns/blitz-clips${qs}`);
      const data = await res.json();
      clips   = (data.clips || []);
      skipped = new Set();
      renderStack();
    } catch (e) {
      area.innerHTML = `<div class="state-msg"><div class="icon">😕</div><h3>Could not load clips</h3><p>${e.message}</p></div>`;
    }
  }

  // ── Render stack ──────────────────────────────────────────────────────────────
  function renderStack() {
    const area   = document.getElementById('stackArea');
    const visible = clips.filter(c => !skipped.has(c.id));

    if (visible.length === 0) {
      area.innerHTML = `
        <div class="state-msg">
          <div class="icon">🎉</div>
          <h3>You've seen them all</h3>
          <p>Switch genre or check back after the next weekly scrape.</p>
        </div>`;
      return;
    }

    // Show top 3 clips (the rest are "behind" visually)
    const toShow = visible.slice(0, 3);
    let html = `<div class="clip-count">${visible.length} clip${visible.length !== 1 ? 's' : ''} available</div>`;

    toShow.forEach((clip, idx) => {
      const isTop   = idx === 0;
      const opacity = isTop ? 1 : (0.6 - idx * 0.15);
      const scale   = isTop ? 1 : (0.97 - idx * 0.02);
      const marginT = isTop ? 0 : -12;

      html += `
        <div class="clip-card" id="card-${clip.id}" style="opacity:${opacity};transform:scale(${scale});margin-top:${marginT}px;${idx > 0 ? 'pointer-events:none' : ''}">
          <div class="clip-thumb">
            ${clip.cover_url
              ? `<img src="${clip.cover_url}" alt="" onerror="this.parentElement.innerHTML='<div class=clip-thumb-placeholder>🎵</div>'">`
              : `<div class="clip-thumb-placeholder">🎵</div>`
            }
            <div class="clip-views-badge">👁 ${formatViews(clip.views)}</div>
            ${clip.tiktok_url ? `<a class="clip-open-btn" href="${clip.tiktok_url}" target="_blank" rel="noopener">▶ Watch</a>` : ''}
            ${clip.format_type ? `<div class="clip-format-badge">${clip.format_type.replace(/_/g,' ')}</div>` : ''}
          </div>
          <div class="clip-body">
            <div class="clip-one-liner">${clip.one_liner || clip.hook_pattern?.replace(/_/g,' ') || 'Proven format'}</div>
            <div class="clip-caption">${clip.caption || ''}</div>
            <div class="clip-tags">
              ${(clip.genre_tags || []).slice(0, 4).map(g => `<span class="clip-tag">${g}</span>`).join('')}
              ${clip.hook_pattern ? `<span class="clip-tag" style="color:var(--accent2);border-color:var(--accent2)">${clip.hook_pattern.replace(/_/g,' ')}</span>` : ''}
            </div>
            ${isTop ? `
            <div class="clip-actions">
              <button class="btn-skip" onclick="skipClip('${clip.id}')">Skip</button>
              <button class="btn-use" onclick="useClip('${clip.id}')" id="use-${clip.id}">
                Make this for ${SONG ? SONG.slice(0,20) + (SONG.length > 20 ? '…' : '') : 'my song'} →
              </button>
            </div>` : ''}
          </div>
        </div>`;
    });

    area.innerHTML = html;
  }

  // ── Skip ─────────────────────────────────────────────────────────────────────
  function skipClip(id) {
    const card = document.getElementById(`card-${id}`);
    if (card) {
      card.style.transition = 'transform 0.25s, opacity 0.25s';
      card.style.transform  = 'translateX(100px) rotate(5deg)';
      card.style.opacity    = '0';
      setTimeout(() => {
        skipped.add(id);
        renderStack();
      }, 220);
    } else {
      skipped.add(id);
      renderStack();
    }
  }

  // ── Use clip → generate ───────────────────────────────────────────────────────
  async function useClip(clipId) {
    if (!TOKEN || !CAMPAIGN) {
      toast('⚠️ Open Blitz from your dashboard link');
      return;
    }

    const btn = document.getElementById(`use-${clipId}`);
    const origText = btn.innerHTML;
    btn.innerHTML  = '<span class="spinner"></span> Generating…';
    btn.disabled   = true;

    try {
      const res  = await fetch(`/api/campaigns/${CAMPAIGN}/blitz-generate?token=${TOKEN}`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ clip_id: clipId }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'Generation failed');

      currentResult = data;
      queuedPostId  = data.post?.id || null;
      showResult(data);

    } catch (e) {
      toast('❌ ' + e.message);
    } finally {
      btn.innerHTML = origText;
      btn.disabled  = false;
    }
  }

  // ── Show result sheet ─────────────────────────────────────────────────────────
  function showResult(data) {
    const { generated, source_clip } = data;

    // Source card
    document.getElementById('resultSource').innerHTML = `
      ${source_clip.cover_url
        ? `<img src="${source_clip.cover_url}" alt="">`
        : `<div style="width:36px;height:36px;border-radius:6px;background:#222;display:flex;align-items:center;justify-content:center;font-size:1.1rem">🎵</div>`}
      <div class="result-source-text">
        Adapted from a clip with <span class="result-source-views">${formatViews(source_clip.views)} views</span>
        ${source_clip.tiktok_url ? `· <a href="${source_clip.tiktok_url}" target="_blank" style="color:var(--accent2);text-decoration:none">Watch original ↗</a>` : ''}
      </div>`;

    // Hook
    document.getElementById('resultHook').textContent = generated.hook_text;

    // Slides
    const labels = ['Hook', 'Build', 'Payoff', 'CTA'];
    document.getElementById('resultSlides').innerHTML = (generated.slides || []).map((s, i) => `
      <div class="result-slide">
        <div class="result-slide-num">${i+1}</div>
        <div><span style="font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">${labels[i] || ''}</span><br>${s}</div>
      </div>`).join('');

    // Why it works
    document.getElementById('resultWhy').textContent = '💡 ' + (generated.why_it_works || '');

    // Queue button state
    const btnQ = document.getElementById('btnQueue');
    btnQ.textContent = '✅ Added to queue';
    btnQ.disabled    = true; // already saved when we called blitz-generate

    document.getElementById('resultOverlay').classList.add('visible');
  }

  // ── Close result ──────────────────────────────────────────────────────────────
  function closeResult() {
    document.getElementById('resultOverlay').classList.remove('visible');
    // Move to next clip after closing
    if (currentResult?.source_clip?.id) {
      skipped.add(currentResult.source_clip.id);
      renderStack();
    }
    currentResult = null;
  }

  // ── Copy caption ──────────────────────────────────────────────────────────────
  document.getElementById('btnCopy').addEventListener('click', () => {
    const hook = currentResult?.generated?.hook_text || '';
    navigator.clipboard.writeText(hook).then(() => toast('✅ Caption copied'));
  });

  document.getElementById('resultClose').addEventListener('click', closeResult);
  document.getElementById('resultOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('resultOverlay')) closeResult();
  });

  // ── Genre filter ──────────────────────────────────────────────────────────────
  document.getElementById('genreBar').addEventListener('click', e => {
    const chip = e.target.closest('.genre-chip');
    if (!chip) return;
    document.querySelectorAll('.genre-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeGenre = chip.dataset.genre;
    loadClips(activeGenre);
  });

  // ── No campaign token — show demo mode notice ─────────────────────────────────
  if (!TOKEN || !CAMPAIGN) {
    // Still show clips in browse mode, just can't generate
    const notice = document.createElement('div');
    notice.style.cssText = 'background:#1a1200;border:1px solid #665500;border-radius:10px;padding:.65rem 1rem;font-size:.8rem;color:#ccaa44;margin:0 1.25rem;';
    notice.textContent = '👀 Browse mode — open from your dashboard to generate posts';
    document.querySelector('.genre-bar').after(notice);
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  loadClips();
</script>
</body>
</html>
