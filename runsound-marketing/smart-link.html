<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Summer Love — MBN</title>
  <meta property="og:title" content="Summer Love — MBN">
  <meta property="og:description" content="Listen to Summer Love by MBN on your favourite platform">
  <meta name="twitter:card" content="summary">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      overflow-x: hidden;
    }

    /* Ambient glow behind artwork */
    .glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 20%, rgba(80,40,160,0.35) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Artwork placeholder — square with gradient */
    .artwork {
      width: 180px;
      height: 180px;
      border-radius: 16px;
      background: linear-gradient(135deg, #6c3fcc 0%, #c0392b 50%, #e67e22 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      margin-bottom: 1.5rem;
      overflow: hidden;
      flex-shrink: 0;
    }
    .artwork img {
      width: 100%; height: 100%; object-fit: cover;
    }

    .song-title {
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }

    .artist-name {
      font-size: 1rem;
      color: rgba(255,255,255,0.55);
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .genre-badge {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      padding: 0.2rem 0.75rem;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 2rem;
    }

    .platforms {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .platform-btn {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.9rem 1.1rem;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      -webkit-tap-highlight-color: transparent;
    }

    .platform-btn:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    @media (hover: hover) {
      .platform-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      }
    }

    .platform-icon {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .platform-icon svg {
      width: 22px;
      height: 22px;
    }

    .platform-name { flex: 1; }

    .platform-arrow {
      font-size: 1.1rem;
      opacity: 0.7;
    }

    .footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      z-index: 1;
    }
    .footer a {
      color: rgba(255,255,255,0.3);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="artwork">🎵</div>
    <h1 class="song-title">Summer Love</h1>
    <p class="artist-name">MBN · <span style="opacity:0.7">@mbn19902</span></p>
    <span class="genre-badge">pop</span>
    <div class="platforms">

        <a href="https://open.spotify.com/track/3UK2G7CRI6aYnJyI0Aedl7?si=1ed95fb618204c02" class="platform-btn" style="background:#1DB954" target="_blank" rel="noopener" data-platform="Spotify">
          <span class="platform-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg></span>
          <span class="platform-name">Listen on Spotify</span>
          <span class="platform-arrow">›</span>
        </a>

    </div>
  </div>
  <div class="footer">
    Powered by <a href="https://runsound.se" target="_blank">RunSound</a>
  </div>

  <script>
    // Track clicks for analytics (optional — add your own analytics here)
    document.querySelectorAll('.platform-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const platform = btn.dataset.platform;
        if (typeof gtag !== 'undefined') gtag('event', 'click', { event_category: 'platform', event_label: platform });
        // Add any other analytics here
      });
    });
  </script>
</body>
</html>
